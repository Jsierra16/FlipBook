<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Flipbook Test</title>
</head>

<body>
  <audio id="flip-sound" src="sound/page-flip.mp3" preload="auto"></audio>

  <div class="flipbook" id="flipbook">
    <div class="hard">FlipTest <small>~ Jsierra</small></div>
    <div class="hard"></div>
    <div>
      <small>Test para el Libro</small>
    </div>

    <div class="hard"></div>
    <div class="hard">Test End <small>~ Jsierra</small></div>
  </div>

  <script src="jquery.js"></script>
  <script src="turn.js"></script>
  
 <script>
  const flipbook = $("#flipbook");
  const audio = document.getElementById('flip-sound');
  const totalPages = 132;

  // 1. Generate pages 1 to 132
  for (let i = 1; i <= totalPages; i++) {
    let pageNum = i.toString().padStart(3, '0');
    
    // This is the specific string you asked for
    let rawPath = `Paginas/1° diagramación_compressed-${pageNum}.png`;
    
    // encodeURI handles the spaces, the ° symbol, and the ó accent safely
    let safePath = encodeURI(rawPath);

    const pageHtml = `
      <div>
        <img src="${safePath}" alt="Page ${i}" />
        <small> Page ${i} </small>
      </div>`;

    // Insert before the last two "hard" covers
    $(pageHtml).insertBefore(flipbook.find(".hard").eq(2));
  }

  // 2. Initialize Turn.js
  flipbook.turn({
    width: 800,
    height: 600,
    autoCenter: true,
    when: {
      turning: function(event, page, view) {
        if (audio) {
          audio.currentTime = 0;
          audio.play().catch(e => console.log("Audio play blocked until user interaction"));
        }
      }
    }
  });
</script>
</body>

</html>
