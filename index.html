<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Flipbook Test</title>
</head>

<body>
  <audio id="flip-sound" src="sound/page-flip.mp3" preload="auto"></audio>

  <div class="flipbook" id="flipbook">
    <div class="hard">FlipTest <small>~ Jsierra</small></div>
    <div class="hard"></div>
    <div>
      <small>Test para el Libro</small>
    </div>

    <div class="hard"></div>
    <div class="hard">Test End <small>~ Jsierra</small></div>
  </div>

  <script src="jquery.js"></script>
  <script src="turn.js"></script>
  
  <script>
    const flipbook = $("#flipbook");
    const audio = document.getElementById('flip-sound');
    const totalPages = 132;

    // 1. Generate pages 1 to 132
    for (let i = 1; i <= totalPages; i++) {
      let pageNum = i.toString().padStart(3, '0');
      
      const pageHtml = `
        <div>
          <img src="images/1° diagramación_compressed-${pageNum}.png" alt="Page ${i}" />
          <small> Page ${i} </small>
        </div>`;

      // Insert before the last two "hard" covers
      $(pageHtml).insertBefore(flipbook.find(".hard").eq(2));
    }

    // 2. Initialize Turn.js with Sound Logic
    flipbook.turn({
      width: 800,
      height: 600,
      autoCenter: true,
      when: {
        turning: function(event, page, view) {
          // Play sound when the page starts to turn
          playFlipSound();
        }
      }
    });

    function playFlipSound() {
      // Reset sound to start (in case user flips fast)
      audio.currentTime = 0;
      audio.play().catch(function(error) {
        // Browsers block auto-playing audio until the user clicks something.
        console.log("Audio playback waited for user interaction.");
      });
    }
  </script>
</body>

</html>
